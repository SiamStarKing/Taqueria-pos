<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz de Cobro</title>
    <link rel="icon" href="img/taco.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <section class="menu-section">
            <header class="menu-header">
                <h1>Taquería</h1>
                <div class="search-container">
                    <input type="text" id="buscador" placeholder="🔍 Buscar producto..." onkeyup="buscarProducto()">
                </div>
                <a href="admin.html" class="btn-admin">⚙️</a>
            </header>

            <nav class="categorias-bar">
                <button class="active" onclick="filtrarMenu('Todos', this)">Todos</button>
                <button onclick="filtrarMenu('Alimento', this)">🌮 Alimentos</button>
                <button onclick="filtrarMenu('Bebida', this)">🥤 Bebidas</button>
                <button onclick="filtrarMenu('Extra', this)">➕ Extras</button>
                <button onclick="filtrarMenu('Postre', this)">🍰 Postres</button>
                <button onclick="filtrarMenu('Dulce', this)">🍬 Dulces</button>
            </nav>

            <div class="menu-grid" id="menu"></div>
        </section>

        <aside class="ticket-section" id="ticket-movil">
            <div class="ticket-swipe-handle" onclick="toggleOrden()">
                <span class="barra-deslizar"></span>
                <p>Ver mi orden</p>
            </div>
            
            <h2>Orden Actual</h2>
            <div class="ticket-items" id="lista-orden"></div>
            <div class="ticket-footer">
                <div class="total-container">
                    <span>TOTAL:</span>
                    <span id="total-pagar">$0.00</span>
                </div>
                <div class="acciones-orden">
                    <button class="btn-cancelar" onclick="limpiarCarrito()">Cancelar</button>
                    <button class="btn-cobrar" onclick="finalizarVenta()">COBRAR</button>
                </div>
            </div>
        </aside>
    </div>

    <div id="modal-cobro" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Finalizar Venta</h2>
            <div class="modal-body">
                <div class="dato-pago">
                    <span>Total a Pagar:</span>
                    <strong id="modal-total" style="color: var(--verde);">$0.00</strong>
                </div>
                
                <div class="campo-entrada">
                    <label>Efectivo Recibido:</label>
                    <input type="number" id="monto-recibido" placeholder="0.00" oninput="calcularCambioReal()">
                </div>

                <div class="botones-rapidos">
                    <button onclick="fijarMonto(50)">$50</button>
                    <button onclick="fijarMonto(100)">$100</button>
                    <button onclick="fijarMonto(200)">$200</button>
                    <button onclick="fijarMonto(500)">$500</button>
                </div>

                <div class="dato-pago">
                    <span>Cambio:</span>
                    <strong id="modal-cambio" style="color: var(--rojo);">$0.00</strong>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="cerrarModalPago()">Cancelar</button>
                <button class="btn-cobrar" onclick="procesarVentaFinal()">Confirmar Pago</button>
            </div>
        </div>
    </div>

    <script src="js/dexie.min.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/caja.js"></script> 

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker registrado con éxito.'))
            .catch((err) => console.log('Error al registrar Service Worker:', err));
        }
    </script>
</body>
</html>
